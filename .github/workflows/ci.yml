name: CI

on:
  push:
  pull_request:

jobs:
  foundation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.12"

      - name: Verify project foundation
        run: |
          set -euo pipefail
          test -f README.md
          test -f README.zh-CN.md
          test -f AGENTS.md
          test -f docs/product-foundation.md
          test -f docs/superpowers/specs/2026-06-13-catalog-design.md
          test -f ops/opt-overlay.md
          test -f ops/constraints/production.md
          test -f ops/constraints/main-entry.md
          test -f ops/skills/evolution.md
          grep -q "README.zh-CN.md" README.md
          grep -q "README.md" README.zh-CN.md
          grep -q "mcp-risk-index validate" README.md
          grep -q "mcp-risk-index validate" README.zh-CN.md
          grep -q "mcp-risk-index.catalog.v1" docs/superpowers/specs/2026-06-13-catalog-design.md
          grep -q "unsupported claims" docs/superpowers/specs/2026-06-13-catalog-design.md
          grep -q "Do not modify OPT" ops/opt-overlay.md
          grep -q "Work on feature branches only" ops/opt-overlay.md
          grep -q "not a demo" ops/constraints/production.md
          grep -q "Delete Or Weaken" ops/skills/evolution.md

      - name: Install package
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e '.[dev]'

      - name: Run tests
        run: python3 -m pytest tests -q

      - name: Run CLI smoke checks
        run: |
          set -euo pipefail
          mcp-risk-index --version
          mcp-risk-index init --output /tmp/mcp-risk-index.catalog.yml
          mcp-risk-index validate --catalog /tmp/mcp-risk-index.catalog.yml --strict
          mcp-risk-index validate --catalog data/catalog.yml --strict
          mcp-risk-index render --catalog data/catalog.yml --format json --output /tmp/mcp-risk-index.json
          grep -q "mcp-risk-index.catalog.v1" /tmp/mcp-risk-index.json
