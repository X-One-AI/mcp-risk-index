      name: ctx7
    launch:
      command: "npx ctx7 setup"
      version_pinned: false
    permissions:
      filesystem:
        - "agent skill or MCP configuration generated by setup"
      network:
        - "Context7 hosted MCP endpoint and documentation retrieval"
      environment:
        - "CONTEXT7_API_KEY header for higher rate limits"
      process:
        - "setup command modifies supported coding-agent configuration"
    maintenance:
      repository: https://github.com/upstash/context7
      source_checked_at: "2026-06-14"
      release_signal: "57,341 stars and 2,708 forks; repository updated 2026-06-14 per GitHub repository metadata"
    risk_signals:
      - id: network-access
        level: review
        evidence:
          - "README documents the hosted MCP URL https://mcp.context7.com/mcp"
      - id: env-access
        level: review
        evidence:
          - "README documents passing an API key via the CONTEXT7_API_KEY header"
      - id: filesystem-access
        level: review
        evidence:
          - "README says ctx7 setup installs the appropriate skill or MCP configuration"
      - id: process-exec
        level: review
        evidence:
          - "launch.command runs setup through npx"
      - id: unpinned-launch
        level: review
        evidence:
          - "launch.command uses npx without an exact package version"
    limitations:
      - "Hosted service behavior, API-key handling, and private backend components are not fully represented by public repository files."

