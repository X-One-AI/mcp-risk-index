  - id: playwright-mcp
    name: Playwright MCP
    homepage: https://github.com/microsoft/playwright-mcp
    package:
      manager: npx
      name: "@playwright/mcp"
    launch:
      command: "npx @playwright/mcp@latest"
      version_pinned: false
    permissions:
      filesystem:
        - "optional storage state, user data directory, output directory, secrets file, init page, and init script paths"
      network:
        - "browser automation can navigate to and inspect web origins allowed by runtime configuration"
      environment:
        - "PLAYWRIGHT_MCP_* options including host, origin, profile, storage, proxy, and secrets-file settings"
      process:
        - "local or containerized browser automation"
    maintenance:
      repository: https://github.com/microsoft/playwright-mcp
      source_checked_at: "2026-06-14"
      release_signal: "33,898 stars and 2,802 forks; repository updated 2026-06-14 per GitHub repository metadata"
    risk_signals:
      - id: sensitive-domain-access
        level: high-review
        evidence:
          - https://github.com/microsoft/playwright-mcp
      - id: network-access
        level: high-review
        evidence:
          - "README documents browser navigation, network request inspection, allowed-origin options, and HTTP transport"
      - id: filesystem-access
        level: review
        evidence:
          - "README documents user data directories, storage state files, output directories, secrets files, init pages, and init scripts"
      - id: env-access
        level: review
        evidence:
          - "README lists PLAYWRIGHT_MCP_* environment variables for runtime options"
      - id: process-exec
        level: review
        evidence:
          - "README documents local browser automation and Docker launch modes"
      - id: unpinned-launch
        level: review
        evidence:
          - "launch.command uses @latest rather than an exact package version"
    limitations:
      - "Actual exposure depends on browser profile choice, origin policy, enabled capabilities, and whether existing logged-in browser state is connected."

  - id: context7
    name: Context7
    homepage: https://github.com/upstash/context7
