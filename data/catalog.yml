  - id: github-mcp-server
    name: GitHub MCP Server
    homepage: https://github.com/github/github-mcp-server
    package:
      manager: docker
      name: ghcr.io/github/github-mcp-server
    launch:
      command: "docker run -i --rm -e GITHUB_PERSONAL_ACCESS_TOKEN ghcr.io/github/github-mcp-server"
      version_pinned: false
    permissions:
      filesystem: []
      network:
        - "GitHub API access based on token scopes"
      environment:
        - "GITHUB_PERSONAL_ACCESS_TOKEN or equivalent credential"
      process:
        - "Docker container launch"
    maintenance:
      repository: https://github.com/github/github-mcp-server
      source_checked_at: "2026-06-14"
      release_signal: "30,659 stars and 4,390 forks; repository updated 2026-06-14 per GitHub repository metadata"
    risk_signals:
      - id: network-access
        level: high-review
        evidence:
          - https://github.com/github/github-mcp-server
      - id: env-access
        level: high-review
        evidence:
          - "launch.command passes GITHUB_PERSONAL_ACCESS_TOKEN into the server environment"
      - id: process-exec
        level: review
        evidence:
          - "launch.command starts a Docker container"
      - id: unpinned-launch
        level: review
        evidence:
          - "launch.command does not pin an image digest or tag"
    limitations:
      - "Risk depends heavily on GitHub token scopes and organization policy."

